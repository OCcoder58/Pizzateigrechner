<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Rezeptrechner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Pizza Rezeptrechner</h1>
    <p class="subtitle">New York Slice Teig</p>

    <div class="input-box">
      <label for="flour">Mehlmenge in Gramm:</label>
      <input type="number" id="flour" placeholder="z. B. 500">
      <button id="calculateBtn">Berechnen</button>
    </div>

    <div class="result-box">
      <h2>Zutaten</h2>
      <p>Wasser: <span id="water">-</span> g</p>
      <p>Salz: <span id="salt">-</span> g</p>
      <p>Zucker: <span id="sugar">-</span> g</p>
      <p>Olivenöl: <span id="oil">-</span> g</p>
      <p>Hefe: <span id="yeast">-</span> g</p>
    </div>

    <div class="info-box">
      <p><strong>Basisrezept für New York Slice pro 1000 g Mehl:</strong></p>
      <p>Wasser: 600 g | Salz: 32 g | Zucker: 20 g | Olivenöl: 30 g | Hefe: 5 g</p>
    </div>
  </div>

  <script src="dist/script.js"></script>
</body>
</html>
